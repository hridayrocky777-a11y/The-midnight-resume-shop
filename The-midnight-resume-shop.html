<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume Shop</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; padding:0;}
    header { background:#4a90e2; color:white; text-align:center; padding:20px;}
    .container { display:flex; flex-wrap:wrap; justify-content:center; gap:20px; padding:20px;}
    .card { background:white; padding:10px; border-radius:10px; text-align:center; width:200px; cursor:pointer; box-shadow:0 4px 8px rgba(0,0,0,0.1);}
    .card img { width:100%; border-radius:8px; }
    #previewModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;}
    #previewContent { background:white; padding:20px; border-radius:10px; text-align:center; max-width:400px; }
    #previewContent img { width:100%; }
    #previewContent a { display:inline-block; margin-top:10px; background:#4a90e2; color:white; padding:10px 15px; text-decoration:none; border-radius:5px; }
  </style>
</head>
<body>

<header>
  <h1>Resume Templates</h1>
</header>

<div class="container">
  <div class="card" onclick="showPreview('Professional Blue', 'https://via.placeholder.com/300x400.png?text=Template+1', 'https://www.canva.com/design/DAHFKJekCnM/fhDlHgI7PmpRfzfcfURGaQ/edit?utm_content=DAHFKJekCnM&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton')">
    <img src="https://i.postimg.cc/59P9WF3g/image.jpg"Template 1">
     <button onclick="addToCart('Professional Blue')">Add to Cart</button>
    <h3>Professional Blue</h3>
  </div>

  <div class="card" onclick="showPreview('Creative Minimal', 'https://via.placeholder.com/300x400.png?text=Template+2', 'https://www.canva.com/design/DAHFKNI6N0A/It7kEw7Y7QxgT06AXNcPgA/edit?utm_content=DAHFKNI6N0A&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton')">
    <img src="https://i.postimg.cc/pXD0nKSN/Attractive-CV-designing-(1).jpg"Template 2">
     <button onclick="addToCart('Creative Minimal')">Add to Cart</button>
    <h3>Creative Minimal</h3>
  </div>

 <div class="container">
  <div class="card" onclick="showPreview('Midnight Pro', 'https://via.placeholder.com/300x400.png?text=Template+1', 'https://www.canva.com/design/DAHFKIjMwho/HAaNY8jkef3MFXS7G1v-Og/edit?utm_content=DAHFKIjMwho&utm_campaign=designshare&utm_medium=link2&utm_source=sharebutton')">
    <img src="https://i.postimg.cc/GpXQPCGb/Resume-for-Job.jpg"Template 3>
     <button onclick="addToCart('Midnight Pro')">Add to Cart</button>
    <h3>Midnight Pro</h3>
  </div>


<!-- Preview Modal -->
<div id="previewModal" onclick="closePreview()">
  <div id="previewContent" onclick="event.stopPropagation()">
    <h2 id="templateTitle"></h2>
    <img id="templateImage" src="" alt="Preview">
    <br>
    <a id="buyButton" href="#" target="_blank">Pay & Download</a>
  </div>
</div>

<script>
function showPreview(title, imgSrc, link){
  document.getElementById('templateTitle').innerText = title;
  document.getElementById('templateImage').src = imgSrc;
  document.getElementById('buyButton').href = link;
  document.getElementById('previewModal').style.display = 'flex';
}

function closePreview(){
  document.getElementById('previewModal').style.display = 'none';
}
</script>
<script>
let cart = [];

function addToCart(templateName) {
    cart.push(templateName);
    alert(templateName + " added to cart! Total items: " + cart.length);
}
</script>

</body>
</html>
